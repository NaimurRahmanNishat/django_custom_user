<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        min-height: 100vh;
      }

      .card {
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .profile-icon {
        width: 80px;
        height: 80px;
        background: #4e73df;
        color: #fff;
        font-size: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: -50px auto 10px;
        border: 5px solid #fff;
      }

      .info-label {
        font-weight: 600;
        color: #6c757d;
      }

      .info-value {
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
      <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="card p-4 text-center">

          <!-- Profile Icon -->
          <div class="profile-icon">
            {{user.first_name|slice:":1"}}
          </div>

          <!-- Name -->
          <h3 class="mb-3">
            {{user.first_name}} {{user.last_name}}
          </h3>

          <hr />

          <!-- User Info -->
          <div class="text-start">
            <p><span class="info-label">Email:</span><br>
              <span class="info-value">{{user.email}}</span>
            </p>

            <p><span class="info-label">User Type:</span><br>
              <span class="info-value">{{user.UserType}}</span>
            </p>

            <p><span class="info-label">Gender:</span><br>
              <span class="info-value">{{user.Gender}}</span>
            </p>

            <p><span class="info-label">Education:</span><br>
              <span class="info-value">{{user.Education}}</span>
            </p>
          </div>

          <!-- Button -->
          <div class="mt-3">
            <a href="#" class="btn btn-primary w-100">Edit Profile</a>
          </div>
          <div class="mt-3">
            <a href="{% url 'signout' %}" class="btn btn-primary w-100">Logout</a>
          </div>

        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
